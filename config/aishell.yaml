units_type: character
feature_source: kaldi
feature_type: mfcc
data:
    name: aishell
    vocab: egs/aishell/data/vocab
    left_context_width: 3
    right_context_width: 0
    max_target_length: 50
    batch_size: 16
    short_first: True
    shuffle: False
    train: egs/aishell/data/train
    dev: egs/aishell/data/dev
    test: egs/aishell/data/test
model:
    type: transducer
    enc:
        type: lstm
        hidden_size: 160
        output_size: 80
        n_layers: 4
        bidirectional: True
    dec:
        type: lstm
        hidden_size: 128
        output_size: 80
        n_layers: 1
    joint:
        input_size: 160
        inner_size: 256
    vocab_size: 29
    share_weight: False
    feature_dim: 30
    dropout: 0.0
training:
    load_model: 'egs/aishell/exp/4blstm_320henc_1l512dec/best_far.chkpt'
    load_encoder: False
    load_decoder: False
    eval_or_not: True
    seed: 1342
    num_gpu: 1
    epochs: 100
    max_grad_norm: 200
    visualization: True
    show_interval: 10
    save_model: 4blstm_320henc_1l512dec
optim:
    type: sgd
    lr: 0.003
    momentum: 0.9
    decay_ratio: 0.9
    weight_decay: 0
    begin_to_adjust_lr: 20
